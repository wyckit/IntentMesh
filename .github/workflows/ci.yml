name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Release hygiene: formatting must be clean (gates the dotnet format pass).
      - name: Format (verify no changes)
        run: dotnet format IntentMesh.slnx --verify-no-changes

      - name: Build (Release)
        run: dotnet build IntentMesh.slnx -c Release --nologo

      - name: Verify TLM bundle (round-trip + checksum)
        run: dotnet run --project src/IntentMesh.Tlm.Cli -c Release --no-build -- verify --root dataset

      - name: Test
        run: dotnet test IntentMesh.slnx -c Release --no-build --nologo

      - name: Policy fixtures
        run: dotnet run --project src/IntentMesh.Cli -c Release --no-build -- policy fixtures

      - name: "E2E smoke (full path: propose -> gate -> tool -> persist -> replay)"
        env:
          INTENTMESH_REQUIRE_REAL_MCP: '1'   # fail if the real stdio MCP leg isn't exercised (node is present on the runner)
        run: dotnet run --project src/IntentMesh.E2E -c Release --no-build

      - name: IntentBench (IntentMesh must score perfect)
        run: dotnet run --project src/IntentMesh.Bench -c Release --no-build -- --out artifacts/bench

      - name: Vulnerability scan (fail on any vulnerable package)
        run: |
          dotnet restore IntentMesh.slnx
          output=$(dotnet list IntentMesh.slnx package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable"; then
            echo "::error::Vulnerable packages detected"; exit 1
          fi

      - name: Pack (release libraries) + validate
        run: |
          dotnet pack IntentMesh.slnx -c Release --no-build -o artifacts/pack
          ls -1 artifacts/pack/*.nupkg
          for pkg in IntentMesh.Tlm IntentMesh.Core IntentMesh.Integrations; do
            ls artifacts/pack/$pkg.*.nupkg >/dev/null 2>&1 || { echo "::error::missing package $pkg"; exit 1; }
          done
