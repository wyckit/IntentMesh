name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

# Least privilege by default; the job opts into exactly what build provenance needs.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-24.04   # pinned runner image for reproducibility
    permissions:
      contents: read
      id-token: write        # for build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup .NET 10 (exact, matches global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '10.0.201'

      # On a release tag (refs/tags/vX.Y.Z), the tag must match Directory.Build.props <Version>.
      - name: Version / tag consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ver=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)
          tag="${GITHUB_REF_NAME#v}"
          echo "props=$ver tag=$tag"
          [ "$ver" = "$tag" ] || { echo "::error::tag v$tag != Directory.Build.props <Version> $ver"; exit 1; }

      # Reproducible restore: fails if a committed packages.lock.json is stale.
      - name: Restore (locked)
        run: dotnet restore IntentMesh.slnx --locked-mode

      # Release hygiene: formatting must be clean (gates the dotnet format pass).
      - name: Format (verify no changes)
        run: dotnet format IntentMesh.slnx --no-restore --verify-no-changes

      - name: Build (Release)
        run: dotnet build IntentMesh.slnx -c Release --no-restore --nologo

      - name: Verify TLM bundle (round-trip + checksum)
        run: dotnet run --project src/IntentMesh.Tlm.Cli -c Release --no-build -- verify --root dataset

      - name: Test
        env:
          INTENTMESH_FS_E2E: '1'   # run the REAL @modelcontextprotocol/server-filesystem path (node + network present)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # live-LLM test runs when the secret is configured, else skips
        run: dotnet test IntentMesh.slnx -c Release --no-build --nologo

      - name: Policy fixtures
        run: dotnet run --project src/IntentMesh.Cli -c Release --no-build -- policy fixtures

      - name: "E2E smoke (full path: propose -> gate -> tool -> persist -> replay)"
        env:
          INTENTMESH_REQUIRE_REAL_MCP: '1'   # fail if the real stdio MCP leg isn't exercised (node is present on the runner)
        run: dotnet run --project src/IntentMesh.E2E -c Release --no-build

      - name: IntentBench (IntentMesh must score perfect)
        run: dotnet run --project src/IntentMesh.Bench -c Release --no-build -- --out artifacts/bench

      - name: Vulnerability scan (fail on any vulnerable package)
        run: |
          output=$(dotnet list IntentMesh.slnx package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable"; then
            echo "::error::Vulnerable packages detected"; exit 1
          fi

      - name: Pack (release libraries) + validate + checksums
        run: |
          dotnet pack IntentMesh.slnx -c Release --no-build -o artifacts/pack
          ls -1 artifacts/pack/*.nupkg
          for pkg in IntentMesh.Tlm IntentMesh.Core IntentMesh.Integrations; do
            ls artifacts/pack/$pkg.*.nupkg >/dev/null 2>&1 || { echo "::error::missing package $pkg"; exit 1; }
          done
          ( cd artifacts/pack && sha256sum *.nupkg > SHA256SUMS && cat SHA256SUMS )

      - name: Attest build provenance for the packages
        if: github.event_name == 'push'   # attestation requires write tokens (not available on fork PRs)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: 'artifacts/pack/*.nupkg'

      - name: Upload packages + checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: intentmesh-packages
          path: |
            artifacts/pack/*.nupkg
            artifacts/pack/SHA256SUMS
          if-no-files-found: error
